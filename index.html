<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Games - Make 10 & Sudoku</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .game-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .game-icon {
            font-size: 4em;
        }

        .game-title {
            font-size: 1.5em;
            font-weight: bold;
        }

        .game-description {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .footer {
            color: #666;
            font-size: 0.9em;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Number Games</h1>
        <p class="subtitle">Choose a game to play</p>
        
        <div class="games-grid">
            <a href="make10.html" class="game-card">
                <div class="game-icon">🎯</div>
                <div class="game-title">Make 10</div>
                <div class="game-description">Match numbers that sum to 10 or form pairs</div>
            </a>
            
            <a href="sudoku.html" class="game-card">
                <div class="game-icon">🧩</div>
                <div class="game-title">Sudoku</div>
                <div class="game-description">Classic number puzzle with multiple difficulty levels</div>
            </a>
        </div>
        
        <div class="footer">
            Made with ❤️ | Free to play
        </div>
    </div>
</body>
</html>
