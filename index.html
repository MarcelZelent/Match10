<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gry Liczbowe - Make 10 & Sudoku</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Graj w Make 10 i Sudoku offline">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gry Liczbowe">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .language-toggle {
            background: white;
            border-radius: 25px;
            padding: 8px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lang-btn {
            padding: 8px 15px;
            border: 2px solid #667eea;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            color: #667eea;
            font-size: 0.9em;
        }

        .lang-btn:hover {
            background: #f0f0f0;
        }

        .lang-btn.active {
            background: #667eea;
            color: white;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .game-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .game-icon {
            font-size: 4em;
        }

        .game-title {
            font-size: 1.5em;
            font-weight: bold;
        }

        .game-description {
            font-size: 0.9em;
            opacity: 0.9;
            line-height: 1.4;
        }

        .footer {
            color: #666;
            font-size: 0.9em;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        #installBtn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #4ade80;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: none;
            transition: all 0.3s ease;
        }

        #installBtn:hover {
            background: #22c55e;
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            .subtitle {
                font-size: 1em;
                margin-bottom: 30px;
            }

            .game-icon {
                font-size: 3em;
            }

            .game-title {
                font-size: 1.3em;
            }

            .game-description {
                font-size: 0.85em;
            }

            .games-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .game-card {
                padding: 25px 15px;
            }

            .language-toggle {
                margin-bottom: 15px;
                padding: 6px 12px;
            }

            .lang-btn {
                padding: 6px 12px;
                font-size: 0.85em;
            }
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 1.7em;
            }

            .container {
                padding: 25px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="language-toggle">
        <button class="lang-btn active" onclick="setLanguage('pl')">🇵🇱 Polski</button>
        <button class="lang-btn" onclick="setLanguage('en')">🇬🇧 English</button>
    </div>

    <div class="container">
        <h1 id="main-title">🎮 Gry Liczbowe</h1>
        <p class="subtitle" id="subtitle">Wybierz grę</p>
        
        <div class="games-grid">
            <a href="make10.html" class="game-card">
                <div class="game-icon">🎯</div>
                <div class="game-title" id="game1-title">Make 10</div>
                <div class="game-description" id="game1-desc">Dopasuj liczby, które sumują się do 10 lub tworzą pary</div>
            </a>
            
            <a href="sudoku.html" class="game-card">
                <div class="game-icon">🧩</div>
                <div class="game-title" id="game2-title">Sudoku</div>
                <div class="game-description" id="game2-desc">Klasyczna łamigłówka liczbowa z różnymi poziomami trudności</div>
            </a>
        </div>
        
        <div class="footer">
            <span id="footer-text">Stworzone z ❤️ | Graj za darmo</span>
            <br>
            <button id="installBtn" onclick="installApp()">📱 <span id="install-text">Zainstaluj aplikację</span></button>
        </div>
    </div>

    <script>
        const translations = {
            pl: {
                mainTitle: '🎮 Gry Dla Mamy',
                subtitle: 'Wybierz grę',
                game1Title: 'Make 10',
                game1Desc: 'Dopasuj liczby, które sumują się do 10 lub tworzą pary',
                game2Title: 'Sudoku',
                game2Desc: 'Klasyczna łamigłówka liczbowa z różnymi poziomami trudności',
                footerText: 'Stworzone z ❤️ | Graj za darmo',
                installText: 'Zainstaluj aplikację'
            },
            en: {
                mainTitle: '🎮 Number Games',
                subtitle: 'Choose a game to play',
                game1Title: 'Make 10',
                game1Desc: 'Match numbers that sum to 10 or form pairs',
                game2Title: 'Sudoku',
                game2Desc: 'Classic number puzzle with multiple difficulty levels',
                footerText: 'Made with ❤️ | Free to play',
                installText: 'Install App'
            }
        };

        function setLanguage(lang) {
            localStorage.setItem('language', lang);
            
            // Update button states without relying on the global event object
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const isActive = btn.textContent.includes(lang === 'pl' ? 'Polski' : 'English');
                btn.classList.toggle('active', isActive);
            });
            
            // Update text
            const t = translations[lang];
            document.getElementById('main-title').textContent = t.mainTitle;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('game1-title').textContent = t.game1Title;
            document.getElementById('game1-desc').textContent = t.game1Desc;
            document.getElementById('game2-title').textContent = t.game2Title;
            document.getElementById('game2-desc').textContent = t.game2Desc;
            document.getElementById('footer-text').textContent = t.footerText;
            document.getElementById('install-text').textContent = t.installText;
            
            document.documentElement.lang = lang;
        }

        // Load saved language or default to Polish
        window.addEventListener('load', () => {
            const savedLang = localStorage.getItem('language') || 'pl';
            setLanguage(savedLang);
        });

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('SW registered:', registration);
                    })
                    .catch(error => {
                        console.log('SW registration failed:', error);
                    });
            });
        }

        // Install prompt
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (installBtn) {
                installBtn.style.display = 'inline-block';
            }
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User installed the app');
                        if (installBtn) {
                            installBtn.style.display = 'none';
                        }
                    }
                    deferredPrompt = null;
                });
            }
        }

        window.addEventListener('appinstalled', () => {
            if (installBtn) {
                installBtn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
