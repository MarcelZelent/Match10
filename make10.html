<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make 10 - Gra dopasowywania liczb</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/192.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        .language-toggle {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .lang-btn {
            padding: 6px 12px;
            border: 2px solid #667eea;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            color: #667eea;
            font-size: 0.8em;
        }

        .lang-btn:hover {
            background: #f0f0f0;
        }

        .lang-btn.active {
            background: #667eea;
            color: white;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .back-link {
            text-align: center;
            margin-bottom: 15px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9em;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .cell {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            font-size: 1.5em;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell:hover:not(.empty):not(.selected) {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .cell.selected {
            background: #ffd700;
            color: #333;
            transform: scale(1.05);
        }

        .cell.empty {
            background: #e0e0e0;
            cursor: default;
        }

        .cell.matched {
            animation: matchAnimation 0.5s ease;
        }

        @keyframes matchAnimation {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) rotate(5deg); background: #4ade80; }
            100% { transform: scale(0); }
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .new-game-btn {
            background: #4ade80;
            color: white;
        }

        .new-game-btn:hover {
            background: #22c55e;
            transform: translateY(-2px);
        }

        .add-row-btn {
            background: #667eea;
            color: white;
        }

        .add-row-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .add-row-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 10px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .message.info {
            background: #dbeafe;
            color: #1e40af;
        }

        .instructions {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.9em;
            color: #555;
        }

        .instructions h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .instructions ul {
            margin-left: 20px;
        }

        .instructions li {
            margin-bottom: 5px;
        }

        @media (max-width: 500px) {
            .game-container {
                padding: 20px;
            }

            h1 {
                font-size: 1.7em;
            }

            .cell {
                font-size: 1.3em;
            }

            .instructions {
                font-size: 0.85em;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="language-toggle">
            <button class="lang-btn active" onclick="setLanguage('pl')">🇵🇱 PL</button>
            <button class="lang-btn" onclick="setLanguage('en')">🇬🇧 EN</button>
        </div>

        <h1>🎯 Make 10</h1>
        
        <div class="back-link">
            <a href="index.html" id="back-link">← Powrót do gier</a>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label" id="score-label">Wynik</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label" id="moves-label">Ruchy</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label" id="rows-label">Pozostało rzędów</div>
                <div class="stat-value" id="rows-left">3</div>
            </div>
        </div>

        <div class="message" id="message"></div>

        <div class="grid" id="grid"></div>

        <div class="buttons">
            <button class="new-game-btn" onclick="newGame()" id="new-game-btn">Nowa gra</button>
            <button class="add-row-btn" id="add-row-btn" onclick="addRow()">Dodaj rząd (3 pozostało)</button>
        </div>

        <div class="instructions">
            <h3 id="how-to-play">Jak grać:</h3>
            <ul id="instructions-list">
                <li>Kliknij dwie sąsiednie liczby, które sumują się do 10</li>
                <li>Lub kliknij dwie identyczne liczby (para)</li>
                <li>Liczby muszą być obok siebie poziomo lub pionowo</li>
                <li>Wyczyść wszystkie liczby, aby wygrać!</li>
            </ul>
        </div>
    </div>

    <script>
        const translations = {
            pl: {
                backLink: '← Powrót do gier',
                howToPlay: 'Jak grać:',
                instructions: [
                    'Kliknij dwie sąsiednie liczby, które sumują się do 10',
                    'Lub kliknij dwie identyczne liczby (para)',
                    'Liczby muszą być obok siebie poziomo lub pionowo',
                    'Wyczyść wszystkie liczby, aby wygrać!'
                ],
                scoreLabel: 'Wynik',
                movesLabel: 'Ruchy',
                rowsLabel: 'Pozostało rzędów',
                newGameBtn: 'Nowa gra',
                addRowBtn: 'Dodaj rząd',
                left: 'pozostało',
                msgMatch: 'Dopasuj liczby, które sumują się do 10!',
                msgSelect: 'Wybierz sąsiednią komórkę',
                msgCleared: 'Wybór wyczyszczony',
                msgAdjacent: 'Komórki muszą być obok siebie!',
                msgPair: 'Para dopasowana! +',
                msgPerfect10: 'Perfekcyjna 10! +',
                msgIncorrect: 'Potrzeba 10 lub pary!',
                msgWin: '🎉 Wygrałeś! Wynik:',
                msgWinMoves: 'w',
                msgWinMovesText: 'ruchach!',
                confirmWin: 'Gratulacje! Zdobyłeś',
                confirmWinPts: 'punktów w',
                confirmWinMoves: 'ruchach!\n\nGrać ponownie?',
                rowAdded: 'Rząd dodany!',
                rowsRemaining: 'rzędów pozostało'
            },
            en: {
                backLink: '← Back to Games',
                howToPlay: 'How to Play:',
                instructions: [
                    'Click two adjacent numbers that sum to 10',
                    'Or click two identical numbers (pair)',
                    'Numbers must be horizontally or vertically adjacent',
                    'Clear all numbers to win!'
                ],
                scoreLabel: 'Score',
                movesLabel: 'Moves',
                rowsLabel: 'Rows Left',
                newGameBtn: 'New Game',
                addRowBtn: 'Add Row',
                left: 'left',
                msgMatch: 'Match numbers that sum to 10!',
                msgSelect: 'Select an adjacent cell',
                msgCleared: 'Selection cleared',
                msgAdjacent: 'Cells must be adjacent!',
                msgPair: 'Pair matched! +',
                msgPerfect10: 'Perfect 10! +',
                msgIncorrect: 'Need 10 or matching pairs!',
                msgWin: '🎉 You Win! Score:',
                msgWinMoves: 'in',
                msgWinMovesText: 'moves!',
                confirmWin: 'Congratulations! You scored',
                confirmWinPts: 'points in',
                confirmWinMoves: 'moves!\n\nPlay again?',
                rowAdded: 'Row added!',
                rowsRemaining: 'rows remaining'
            }
        };

        let currentLang = 'pl';
        let grid = [];
        let selectedCell = null;
        let score = 0;
        let moves = 0;
        let rowsLeft = 3;
        const COLS = 5;
        const INITIAL_ROWS = 4;

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const isActive = btn.textContent.includes(lang === 'pl' ? 'PL' : 'EN');
                btn.classList.toggle('active', isActive);
            });
            
            updateLanguage();
        }

        function updateLanguage() {
            const t = translations[currentLang];
            document.getElementById('back-link').textContent = t.backLink;
            document.getElementById('how-to-play').textContent = t.howToPlay;
            
            const instructionsList = document.getElementById('instructions-list');
            instructionsList.innerHTML = t.instructions.map(i => `<li>${i}</li>`).join('');
            
            document.getElementById('score-label').textContent = t.scoreLabel;
            document.getElementById('moves-label').textContent = t.movesLabel;
            document.getElementById('rows-label').textContent = t.rowsLabel;
            document.getElementById('new-game-btn').textContent = t.newGameBtn;
            document.getElementById('add-row-btn').textContent = `${t.addRowBtn} (${rowsLeft} ${t.left})`;
            
            document.documentElement.lang = currentLang;
        }

        function initGame() {
            grid = [];
            selectedCell = null;
            score = 0;
            moves = 0;
            rowsLeft = 3;
            
            for (let i = 0; i < INITIAL_ROWS; i++) {
                addNewRow();
            }
            
            updateDisplay();
            showMessage(translations[currentLang].msgMatch, 'info');
        }

        function addNewRow() {
            const row = [];
            for (let i = 0; i < COLS; i++) {
                row.push(Math.floor(Math.random() * 9) + 1);
            }
            grid.push(row);
        }

        function addRow() {
            if (rowsLeft > 0) {
                addNewRow();
                rowsLeft--;
                updateDisplay();
                const t = translations[currentLang];
                showMessage(`${t.rowAdded} ${rowsLeft} ${t.rowsRemaining}`, 'info');
            }
        }

        function renderGrid() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            gridElement.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
            
            for (let row = 0; row < grid.length; row++) {
                for (let col = 0; col < COLS; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (grid[row][col] === 0) {
                        cell.classList.add('empty');
                    } else {
                        cell.textContent = grid[row][col];
                        cell.onclick = () => selectCell(row, col);
                        
                        if (selectedCell && selectedCell.row === row && selectedCell.col === col) {
                            cell.classList.add('selected');
                        }
                    }
                    
                    gridElement.appendChild(cell);
                }
            }
        }

        function selectCell(row, col) {
            if (grid[row][col] === 0) return;

            if (!selectedCell) {
                selectedCell = { row, col, value: grid[row][col] };
                renderGrid();
                showMessage(translations[currentLang].msgSelect, 'info');
            } else {
                if (selectedCell.row === row && selectedCell.col === col) {
                    selectedCell = null;
                    renderGrid();
                    showMessage(translations[currentLang].msgCleared, 'info');
                } else {
                    tryMatch(selectedCell, { row, col, value: grid[row][col] });
                }
            }
        }

        function areAdjacent(cell1, cell2) {
            const rowDiff = Math.abs(cell1.row - cell2.row);
            const colDiff = Math.abs(cell1.col - cell2.col);
            return (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
        }

        function tryMatch(cell1, cell2) {
            const t = translations[currentLang];
            
            if (!areAdjacent(cell1, cell2)) {
                showMessage(t.msgAdjacent, 'error');
                selectedCell = null;
                renderGrid();
                return;
            }

            const sum = cell1.value + cell2.value;
            const isPair = cell1.value === cell2.value;

            if (sum === 10 || isPair) {
                moves++;
                score += sum;
                
                const cells = document.querySelectorAll('.cell');
                const index1 = cell1.row * COLS + cell1.col;
                const index2 = cell2.row * COLS + cell2.col;
                
                cells[index1].classList.add('matched');
                cells[index2].classList.add('matched');
                
                setTimeout(() => {
                    grid[cell1.row][cell1.col] = 0;
                    grid[cell2.row][cell2.col] = 0;
                    selectedCell = null;
                    compactGrid();
                    updateDisplay();
                    checkWin();
                }, 500);
                
                showMessage(isPair ? `${t.msgPair}${sum}` : `${t.msgPerfect10}${sum}`, 'success');
            } else {
                showMessage(`${cell1.value} + ${cell2.value} = ${sum}. ${t.msgIncorrect}`, 'error');
                selectedCell = null;
                renderGrid();
            }
        }

        function compactGrid() {
            for (let row = 0; row < grid.length; row++) {
                grid[row] = grid[row].filter(cell => cell !== 0);
                while (grid[row].length < COLS) {
                    grid[row].push(0);
                }
            }
        }

        function checkWin() {
            const hasNumbers = grid.some(row => row.some(cell => cell !== 0));
            
            if (!hasNumbers) {
                const t = translations[currentLang];
                showMessage(`${t.msgWin} ${score} ${t.msgWinMoves} ${moves} ${t.msgWinMovesText}`, 'success');
                setTimeout(() => {
                    if (confirm(`${t.confirmWin} ${score} ${t.confirmWinPts} ${moves} ${t.confirmWinMoves}`)) {
                        newGame();
                    }
                }, 500);
            }
        }

        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('moves').textContent = moves;
            document.getElementById('rows-left').textContent = rowsLeft;
            
            const t = translations[currentLang];
            const addRowBtn = document.getElementById('add-row-btn');
            addRowBtn.textContent = `${t.addRowBtn} (${rowsLeft} ${t.left})`;
            addRowBtn.disabled = rowsLeft === 0;
            
            renderGrid();
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
        }

        function newGame() {
            initGame();
        }

        // Load saved language and START GAME AUTOMATICALLY
        window.addEventListener('load', () => {
            const savedLang = localStorage.getItem('language') || 'pl';
            setLanguage(savedLang);
            initGame();
        });
    </script>
</body>
</html>
