<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make 10 - Gra dopasowywania liczb</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/192.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            user-select: none;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 760px;
            width: 100%;
        }

        .language-toggle {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .lang-btn {
            padding: 6px 12px;
            border: 2px solid #667eea;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            color: #667eea;
            font-size: 0.8em;
        }

        .lang-btn:hover {
            background: #f0f0f0;
        }

        .lang-btn.active {
            background: #667eea;
            color: white;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .back-link {
            text-align: center;
            margin-bottom: 15px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9em;
        }

        .options {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 10px;
            flex-wrap: wrap;
        }

        .option-label {
            font-size: 0.9em;
            color: #555;
            font-weight: bold;
        }

        .width-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .width-btn {
            flex: none;
            padding: 7px 11px;
            border: 2px solid #667eea;
            background: white;
            border-radius: 10px;
            color: #667eea;
            font-size: 0.85em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .width-btn:hover {
            background: #eef2ff;
        }

        .width-btn.active {
            background: #667eea;
            color: white;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .grid {
            display: grid;
            gap: 8px;
            margin-bottom: 14px;
            min-height: 80px;
        }

        .cell {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            font-size: clamp(0.9em, 4vw, 1.5em);
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell:hover:not(.empty):not(.selected) {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .cell.selected {
            background: #ffd700;
            color: #333;
            transform: scale(1.05);
        }

        .cell.empty {
            background: #e0e0e0;
            cursor: default;
            box-shadow: none;
        }

        .cell.matched {
            animation: matchAnimation 0.5s ease;
        }

        @keyframes matchAnimation {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2) rotate(5deg);
                background: #4ade80;
            }
            100% {
                transform: scale(0);
            }
        }

        .board-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .winnable-btn {
            flex: none;
            background: #fbbf24;
            color: white;
            min-width: 220px;
        }

        .winnable-btn:hover {
            background: #f59e0b;
            transform: translateY(-2px);
        }

        .winnable-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .winnable-result {
            font-weight: bold;
            font-size: 0.95em;
            min-width: 160px;
            text-align: center;
        }

        .winnable-result.success {
            color: #047857;
        }

        .winnable-result.error {
            color: #b91c1c;
        }

        .winnable-result.info {
            color: #1e40af;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .new-game-btn {
            background: #4ade80;
            color: white;
        }

        .new-game-btn:hover {
            background: #22c55e;
            transform: translateY(-2px);
        }

        .undo-btn {
            background: #fb7185;
            color: white;
        }

        .undo-btn:hover {
            background: #e11d48;
            transform: translateY(-2px);
        }

        .undo-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .add-row-btn {
            background: #667eea;
            color: white;
        }

        .add-row-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .add-row-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 10px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .message.info {
            background: #dbeafe;
            color: #1e40af;
        }

        .instructions {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.9em;
            color: #555;
        }

        .instructions h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .instructions ul {
            margin-left: 20px;
        }

        .instructions li {
            margin-bottom: 5px;
        }

        @media (max-width: 500px) {
            .game-container {
                padding: 20px;
            }

            h1 {
                font-size: 1.7em;
            }

            .grid {
                gap: 6px;
            }

            .instructions {
                font-size: 0.85em;
                padding: 12px;
            }

            .width-btn {
                padding: 6px 9px;
                font-size: 0.8em;
            }

            .buttons {
                grid-template-columns: 1fr;
            }

            .winnable-btn {
                width: 100%;
                min-width: unset;
            }

            .winnable-result {
                width: 100%;
            }
        }

        @media (max-width: 380px) {
            .grid {
                gap: 5px;
            }

            .cell {
                border-radius: 7px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="language-toggle">
            <button class="lang-btn active" onclick="setLanguage('pl')">🇵🇱 PL</button>
            <button class="lang-btn" onclick="setLanguage('en')">🇬🇧 EN</button>
        </div>

        <h1>🎯 Make 10</h1>
        
        <div class="back-link">
            <a href="index.html" id="back-link">← Powrót do gier</a>
        </div>

        <div class="options">
            <span class="option-label" id="grid-width-label">Szerokość:</span>
            <div class="width-buttons">
                <button class="width-btn" onclick="setGridWidth(4)" data-width="4">4</button>
                <button class="width-btn active" onclick="setGridWidth(5)" data-width="5">5</button>
                <button class="width-btn" onclick="setGridWidth(6)" data-width="6">6</button>
                <button class="width-btn" onclick="setGridWidth(7)" data-width="7">7</button>
                <button class="width-btn" onclick="setGridWidth(8)" data-width="8">8</button>
                <button class="width-btn" onclick="setGridWidth(9)" data-width="9">9</button>
                <button class="width-btn" onclick="setGridWidth(10)" data-width="10">10</button>
                <button class="width-btn" onclick="setGridWidth(11)" data-width="11">11</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label" id="score-label">Wynik</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label" id="moves-label">Ruchy</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label" id="rows-label">Pozostało rzędów</div>
                <div class="stat-value" id="rows-left">3</div>
            </div>
        </div>

        <div class="message" id="message"></div>

        <div class="grid" id="grid"></div>

        <div class="board-actions">
            <button class="winnable-btn" onclick="checkBoardWinnable()" id="winnable-btn">Sprawdź czy da się wygrać</button>
            <span class="winnable-result info" id="winnable-result"></span>
        </div>

        <div class="buttons">
            <button class="new-game-btn" onclick="newGame()" id="new-game-btn">Nowa gra</button>
            <button class="undo-btn" onclick="undoMove()" id="undo-btn" disabled>↩ Cofnij</button>
            <button class="add-row-btn" id="add-row-btn" onclick="addRow()">Dodaj rząd (3 pozostało)</button>
        </div>

        <div class="instructions">
            <h3 id="how-to-play">Jak grać:</h3>
            <ul id="instructions-list"></ul>
        </div>
    </div>

    <script>
        const translations = {
            pl: {
                backLink: '← Powrót do gier',
                gridWidthLabel: 'Szerokość:',
                howToPlay: 'Jak grać:',
                instructions: [
                    'Kliknij dwie liczby, które sumują się do 10',
                    'Lub kliknij dwie identyczne liczby',
                    'Liczby mogą być obok siebie, po linii prostej, po skosie albo przez puste pola',
                    'Możesz też dopasować przez koniec rzędu do początku niższego rzędu',
                    'Dopasowane liczby zostawiają puste pola na swoim miejscu',
                    'Jeśli cały rząd jest pusty, znika, a rzędy poniżej przesuwają się w górę',
                    'Możesz cofać ruchy bez limitu.',
                    'Nowa plansza jest generowana tak, aby była możliwa do wyczyszczenia.',
                    'Możesz sprawdzić, czy aktualna plansza nadal da się wyczyścić.',
                    'Wyczyść wszystkie liczby, aby wygrać!'
                ],
                scoreLabel: 'Wynik',
                movesLabel: 'Ruchy',
                rowsLabel: 'Pozostało rzędów',
                newGameBtn: 'Nowa gra',
                undoBtn: '↩ Cofnij',
                addRowBtn: 'Dodaj rząd',
                winnableBtn: 'Sprawdź czy da się wygrać',
                left: 'pozostało',
                msgMatch: 'Dopasuj liczby, które sumują się do 10 lub są takie same!',
                msgSelect: 'Wybierz pasującą liczbę',
                msgCleared: 'Wybór wyczyszczony',
                msgNotConnectable: 'Te liczby nie mogą być połączone.',
                msgPair: 'Para dopasowana! +',
                msgPerfect10: 'Perfekcyjna 10! +',
                msgIncorrect: 'Potrzeba 10 lub pary!',
                msgWidthChanged: 'Szerokość planszy zmieniona. Nowa gra rozpoczęta.',
                msgUndo: 'Cofnięto ostatni ruch.',
                msgNoUndo: 'Nie ma ruchu do cofnięcia.',
                msgChecking: 'Sprawdzam...',
                msgWinnable: '✅ Da się wygrać',
                msgNotWinnable: '❌ Nie da się wygrać',
                msgTooHard: '⚠️ Zbyt złożone',
                msgAlreadyWon: '✅ Już pusta',
                msgWin: '🎉 Wygrałeś! Wynik:',
                msgWinMoves: 'w',
                msgWinMovesText: 'ruchach!',
                confirmWin: 'Gratulacje! Zdobyłeś',
                confirmWinPts: 'punktów w',
                confirmWinMoves: 'ruchach!\n\nGrać ponownie?',
                rowAdded: 'Rząd dodany!',
                rowsRemaining: 'rzędów pozostało'
            },
            en: {
                backLink: '← Back to Games',
                gridWidthLabel: 'Width:',
                howToPlay: 'How to Play:',
                instructions: [
                    'Click two numbers that sum to 10',
                    'Or click two identical numbers',
                    'Numbers can match beside each other, in a straight line, diagonally, or through empty spaces',
                    'You can also match from the end of one row to the start of a lower row',
                    'Matched numbers leave empty spaces in place',
                    'If a whole row is empty, it disappears and rows below move up',
                    'You can undo moves with no limit.',
                    'A new board is generated so it is possible to clear.',
                    'You can check if the current board is still possible to clear.',
                    'Clear all numbers to win!'
                ],
                scoreLabel: 'Score',
                movesLabel: 'Moves',
                rowsLabel: 'Rows Left',
                newGameBtn: 'New Game',
                undoBtn: '↩ Undo',
                addRowBtn: 'Add Row',
                winnableBtn: 'Check if winnable',
                left: 'left',
                msgMatch: 'Match numbers that sum to 10 or are the same!',
                msgSelect: 'Select a matching number',
                msgCleared: 'Selection cleared',
                msgNotConnectable: 'These numbers cannot be connected.',
                msgPair: 'Pair matched! +',
                msgPerfect10: 'Perfect 10! +',
                msgIncorrect: 'Need 10 or matching pairs!',
                msgWidthChanged: 'Board width changed. New game started.',
                msgUndo: 'Undid the last move.',
                msgNoUndo: 'There is no move to undo.',
                msgChecking: 'Checking...',
                msgWinnable: '✅ Winnable',
                msgNotWinnable: '❌ Not winnable',
                msgTooHard: '⚠️ Too complex',
                msgAlreadyWon: '✅ Already empty',
                msgWin: '🎉 You Win! Score:',
                msgWinMoves: 'in',
                msgWinMovesText: 'moves!',
                confirmWin: 'Congratulations! You scored',
                confirmWinPts: 'points in',
                confirmWinMoves: 'moves!\n\nPlay again?',
                rowAdded: 'Row added!',
                rowsRemaining: 'rows remaining'
            }
        };

        let currentLang = 'pl';
        let grid = [];
        let selectedCell = null;
        let score = 0;
        let moves = 0;
        let rowsLeft = 3;
        let COLS = 5;
        let history = [];
        let isResolvingMatch = false;

        const INITIAL_ROWS = 4;
        const VALID_WIDTHS = [4, 5, 6, 7, 8, 9, 10, 11];
        const SOLVER_MAX_STATES = 75000;
        const SOLVER_MAX_TIME_MS = 900;

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const isActive = btn.textContent.includes(lang === 'pl' ? 'PL' : 'EN');
                btn.classList.toggle('active', isActive);
            });
            
            updateLanguage();
        }

        function updateLanguage() {
            const t = translations[currentLang];

            document.getElementById('back-link').textContent = t.backLink;
            document.getElementById('grid-width-label').textContent = t.gridWidthLabel;
            document.getElementById('how-to-play').textContent = t.howToPlay;
            
            const instructionsList = document.getElementById('instructions-list');
            instructionsList.innerHTML = t.instructions.map(i => `<li>${i}</li>`).join('');
            
            document.getElementById('score-label').textContent = t.scoreLabel;
            document.getElementById('moves-label').textContent = t.movesLabel;
            document.getElementById('rows-label').textContent = t.rowsLabel;
            document.getElementById('new-game-btn').textContent = t.newGameBtn;
            document.getElementById('undo-btn').textContent = t.undoBtn;
            document.getElementById('winnable-btn').textContent = t.winnableBtn;
            document.getElementById('add-row-btn').textContent = `${t.addRowBtn} (${rowsLeft} ${t.left})`;
            
            document.documentElement.lang = currentLang;
        }

        function setGridWidth(width) {
            if (!VALID_WIDTHS.includes(width)) return;

            COLS = width;
            localStorage.setItem('make10GridWidth', String(COLS));
            updateWidthButtons();
            initGame();
            showMessage(translations[currentLang].msgWidthChanged, 'info');
        }

        function updateWidthButtons() {
            document.querySelectorAll('.width-btn').forEach(btn => {
                const width = Number(btn.dataset.width);
                btn.classList.toggle('active', width === COLS);
            });
        }

        function initGame() {
            selectedCell = null;
            score = 0;
            moves = 0;
            rowsLeft = 3;
            history = [];
            isResolvingMatch = false;
            grid = generateGuaranteedSolvableBoard(INITIAL_ROWS);
            
            updateDisplay();
            clearWinnableResult();
            updateUndoButton();
            showMessage(translations[currentLang].msgMatch, 'info');
        }

        function generateGuaranteedSolvableBoard(rowCount) {
            const totalCells = rowCount * COLS;
            const flatNumbers = [];

            for (let i = 0; i < totalCells; i += 2) {
                const pair = generateCompatiblePair();
                flatNumbers.push(pair[0], pair[1]);
            }

            const board = [];

            for (let row = 0; row < rowCount; row++) {
                const currentRow = [];

                for (let col = 0; col < COLS; col++) {
                    currentRow.push(flatNumbers[row * COLS + col]);
                }

                board.push(currentRow);
            }

            return board;
        }

        function generateCompatiblePair() {
            const useSameNumber = Math.random() < 0.35;

            if (useSameNumber) {
                const value = Math.floor(Math.random() * 9) + 1;
                return maybeSwap([value, value]);
            }

            const first = Math.floor(Math.random() * 9) + 1;
            const second = 10 - first;

            return maybeSwap([first, second]);
        }

        function maybeSwap(pair) {
            if (Math.random() < 0.5) {
                return [pair[1], pair[0]];
            }

            return pair;
        }

        function saveHistory() {
            history.push({
                grid: cloneBoard(grid),
                selectedCell: selectedCell ? { ...selectedCell } : null,
                score,
                moves,
                rowsLeft
            });

            updateUndoButton();
        }

        function undoMove() {
            const t = translations[currentLang];

            if (isResolvingMatch) return;

            if (history.length === 0) {
                showMessage(t.msgNoUndo, 'info');
                return;
            }

            const previous = history.pop();

            grid = cloneBoard(previous.grid);
            selectedCell = previous.selectedCell ? { ...previous.selectedCell } : null;
            score = previous.score;
            moves = previous.moves;
            rowsLeft = previous.rowsLeft;

            updateDisplay();
            clearWinnableResult();
            updateUndoButton();
            showMessage(t.msgUndo, 'info');
        }

        function updateUndoButton() {
            const undoBtn = document.getElementById('undo-btn');
            if (!undoBtn) return;

            undoBtn.disabled = history.length === 0 || isResolvingMatch;
        }

        function addNewRow() {
            const row = [];

            for (let i = 0; i < COLS; i++) {
                row.push(Math.floor(Math.random() * 9) + 1);
            }

            grid.push(row);
        }

        function addRow() {
            if (rowsLeft > 0 && !isResolvingMatch) {
                saveHistory();

                addNewRow();
                rowsLeft--;
                selectedCell = null;
                updateDisplay();
                clearWinnableResult();

                const t = translations[currentLang];
                showMessage(`${t.rowAdded} ${rowsLeft} ${t.rowsRemaining}`, 'info');
            }
        }

        function renderGrid() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            gridElement.style.gridTemplateColumns = `repeat(${COLS}, minmax(0, 1fr))`;
            
            for (let row = 0; row < grid.length; row++) {
                for (let col = 0; col < COLS; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (grid[row][col] === 0) {
                        cell.classList.add('empty');
                    } else {
                        cell.textContent = grid[row][col];
                        cell.onclick = () => selectCell(row, col);
                        
                        if (selectedCell && selectedCell.row === row && selectedCell.col === col) {
                            cell.classList.add('selected');
                        }
                    }
                    
                    gridElement.appendChild(cell);
                }
            }
        }

        function selectCell(row, col) {
            if (isResolvingMatch) return;
            if (grid[row][col] === 0) return;

            if (!selectedCell) {
                selectedCell = { row, col, value: grid[row][col] };
                renderGrid();
                showMessage(translations[currentLang].msgSelect, 'info');
                return;
            }

            if (selectedCell.row === row && selectedCell.col === col) {
                selectedCell = null;
                renderGrid();
                showMessage(translations[currentLang].msgCleared, 'info');
                return;
            }

            tryMatch(selectedCell, { row, col, value: grid[row][col] });
        }

        function areValuesCompatible(cell1, cell2) {
            const sum = cell1.value + cell2.value;
            const isPair = cell1.value === cell2.value;

            return sum === 10 || isPair;
        }

        function canConnect(cell1, cell2, board = grid) {
            return canConnectStraightOrDiagonal(cell1, cell2, board) || canConnectReadingOrder(cell1, cell2, board);
        }

        function canConnectStraightOrDiagonal(cell1, cell2, board = grid) {
            const rowDiff = cell2.row - cell1.row;
            const colDiff = cell2.col - cell1.col;

            const sameRow = rowDiff === 0;
            const sameCol = colDiff === 0;
            const diagonal = Math.abs(rowDiff) === Math.abs(colDiff);

            if (!sameRow && !sameCol && !diagonal) {
                return false;
            }

            const rowStep = Math.sign(rowDiff);
            const colStep = Math.sign(colDiff);

            let row = cell1.row + rowStep;
            let col = cell1.col + colStep;

            while (row !== cell2.row || col !== cell2.col) {
                if (!isInsideGrid(row, col, board)) {
                    return false;
                }

                if (board[row][col] !== 0) {
                    return false;
                }

                row += rowStep;
                col += colStep;
            }

            return true;
        }

        function canConnectReadingOrder(cell1, cell2, board = grid) {
            const index1 = getFlatIndex(cell1.row, cell1.col);
            const index2 = getFlatIndex(cell2.row, cell2.col);

            if (index1 === index2) {
                return false;
            }

            const start = Math.min(index1, index2) + 1;
            const end = Math.max(index1, index2);

            for (let index = start; index < end; index++) {
                const position = getPositionFromFlatIndex(index, board);

                if (!position) {
                    return false;
                }

                if (board[position.row][position.col] !== 0) {
                    return false;
                }
            }

            return true;
        }

        function getFlatIndex(row, col) {
            return row * COLS + col;
        }

        function getPositionFromFlatIndex(index, board = grid) {
            const row = Math.floor(index / COLS);
            const col = index % COLS;

            if (!isInsideGrid(row, col, board)) {
                return null;
            }

            return { row, col };
        }

        function isInsideGrid(row, col, board = grid) {
            return row >= 0 && row < board.length && col >= 0 && col < COLS;
        }

        function tryMatch(cell1, cell2) {
            const t = translations[currentLang];

            if (!areValuesCompatible(cell1, cell2)) {
                const sum = cell1.value + cell2.value;
                showMessage(`${cell1.value} + ${cell2.value} = ${sum}. ${t.msgIncorrect}`, 'error');
                selectedCell = null;
                renderGrid();
                return;
            }

            if (!canConnect(cell1, cell2)) {
                showMessage(t.msgNotConnectable, 'error');
                selectedCell = null;
                renderGrid();
                return;
            }

            saveHistory();

            const sum = cell1.value + cell2.value;
            const isPair = cell1.value === cell2.value;

            moves++;
            score += sum;
            isResolvingMatch = true;
            updateUndoButton();
            
            const cells = document.querySelectorAll('.cell');
            const index1 = cell1.row * COLS + cell1.col;
            const index2 = cell2.row * COLS + cell2.col;
            
            if (cells[index1]) cells[index1].classList.add('matched');
            if (cells[index2]) cells[index2].classList.add('matched');
            
            setTimeout(() => {
                grid[cell1.row][cell1.col] = 0;
                grid[cell2.row][cell2.col] = 0;

                selectedCell = null;

                removeEmptyRows();
                isResolvingMatch = false;
                updateDisplay();
                clearWinnableResult();
                updateUndoButton();
                checkWin();
            }, 500);
            
            showMessage(isPair ? `${t.msgPair}${sum}` : `${t.msgPerfect10}${sum}`, 'success');
        }

        function removeEmptyRows() {
            grid = removeEmptyRowsFromBoard(grid);
        }

        function removeEmptyRowsFromBoard(board) {
            return board.filter(row => row.some(cell => cell !== 0));
        }

        function checkWin() {
            const hasNumbers = grid.some(row => row.some(cell => cell !== 0));
            
            if (!hasNumbers) {
                const t = translations[currentLang];

                showMessage(`${t.msgWin} ${score} ${t.msgWinMoves} ${moves} ${t.msgWinMovesText}`, 'success');
                setWinnableResult(t.msgAlreadyWon, 'success');

                setTimeout(() => {
                    if (confirm(`${t.confirmWin} ${score} ${t.confirmWinPts} ${moves} ${t.confirmWinMoves}`)) {
                        newGame();
                    }
                }, 500);
            }
        }

        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('moves').textContent = moves;
            document.getElementById('rows-left').textContent = rowsLeft;
            
            const t = translations[currentLang];
            const addRowBtn = document.getElementById('add-row-btn');

            addRowBtn.textContent = `${t.addRowBtn} (${rowsLeft} ${t.left})`;
            addRowBtn.disabled = rowsLeft === 0 || isResolvingMatch;
            
            renderGrid();
            updateUndoButton();
        }

        function checkBoardWinnable() {
            const t = translations[currentLang];
            const btn = document.getElementById('winnable-btn');

            if (isResolvingMatch) return;

            if (grid.length === 0 || !grid.some(row => row.some(cell => cell !== 0))) {
                setWinnableResult(t.msgAlreadyWon, 'success');
                return;
            }

            btn.disabled = true;
            setWinnableResult(t.msgChecking, 'info');

            setTimeout(() => {
                const result = isBoardWinnable(grid);

                btn.disabled = false;

                if (result === true) {
                    setWinnableResult(t.msgWinnable, 'success');
                } else if (result === false) {
                    setWinnableResult(t.msgNotWinnable, 'error');
                } else {
                    setWinnableResult(t.msgTooHard, 'info');
                }
            }, 30);
        }

        function setWinnableResult(text, type) {
            const result = document.getElementById('winnable-result');
            result.textContent = text;
            result.className = `winnable-result ${type}`;
        }

        function clearWinnableResult() {
            const result = document.getElementById('winnable-result');
            result.textContent = '';
            result.className = 'winnable-result info';
        }

        function isBoardWinnable(startBoard) {
            const memo = new Set();
            const startTime = performance.now();
            let statesChecked = 0;
            let timedOut = false;

            function dfs(board) {
                if (performance.now() - startTime > SOLVER_MAX_TIME_MS) {
                    timedOut = true;
                    return false;
                }

                statesChecked++;

                if (statesChecked > SOLVER_MAX_STATES) {
                    timedOut = true;
                    return false;
                }

                board = removeEmptyRowsFromBoard(board);

                if (board.length === 0 || !board.some(row => row.some(cell => cell !== 0))) {
                    return true;
                }

                const key = boardToKey(board);

                if (memo.has(key)) {
                    return false;
                }

                memo.add(key);

                const pairs = findAllPossiblePairs(board);

                if (pairs.length === 0) {
                    return false;
                }

                pairs.sort((a, b) => {
                    const boardA = applyPairToBoard(board, a);
                    const boardB = applyPairToBoard(board, b);
                    return boardA.length - boardB.length;
                });

                for (const pair of pairs) {
                    const nextBoard = applyPairToBoard(board, pair);

                    if (dfs(nextBoard)) {
                        return true;
                    }
                }

                return false;
            }

            const solved = dfs(cloneBoard(startBoard));

            if (solved) return true;
            if (timedOut) return null;
            return false;
        }

        function boardToKey(board) {
            return board.map(row => row.join(',')).join('|');
        }

        function cloneBoard(board) {
            return board.map(row => [...row]);
        }

        function findAllPossiblePairs(board) {
            const numbers = [];

            for (let row = 0; row < board.length; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col] !== 0) {
                        numbers.push({
                            row,
                            col,
                            value: board[row][col]
                        });
                    }
                }
            }

            const pairs = [];

            for (let i = 0; i < numbers.length; i++) {
                for (let j = i + 1; j < numbers.length; j++) {
                    const cell1 = numbers[i];
                    const cell2 = numbers[j];

                    if (areValuesCompatible(cell1, cell2) && canConnect(cell1, cell2, board)) {
                        pairs.push({ cell1, cell2 });
                    }
                }
            }

            return pairs;
        }

        function applyPairToBoard(board, pair) {
            const nextBoard = cloneBoard(board);

            nextBoard[pair.cell1.row][pair.cell1.col] = 0;
            nextBoard[pair.cell2.row][pair.cell2.col] = 0;

            return removeEmptyRowsFromBoard(nextBoard);
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
        }

        function newGame() {
            initGame();
        }

        window.addEventListener('load', () => {
            const savedLang = localStorage.getItem('language') || 'pl';
            const savedWidth = Number(localStorage.getItem('make10GridWidth'));

            if (VALID_WIDTHS.includes(savedWidth)) {
                COLS = savedWidth;
            }

            setLanguage(savedLang);
            updateWidthButtons();
            initGame();
        });
    </script>
</body>
</html>
